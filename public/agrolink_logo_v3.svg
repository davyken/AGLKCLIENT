<svg width="820" height="420" viewBox="0 0 820 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Agrolink Logo</title>
  <desc>Agrolink agricultural marketplace logo for Cameroon</desc>

  <style>
    .wordmark { font-family: sans-serif; font-weight: 500; font-size: 84px; fill: #1a5c2a; letter-spacing: -1px; }
    .tagline { font-family: sans-serif; font-weight: 400; font-size: 26px; fill: #5a7a60; letter-spacing: 3px; }
    .bg-ring { fill: #e8f5ea; }
  </style>

  <circle cx="200" cy="210" r="120" class="bg-ring"/>
  <circle cx="200" cy="210" r="120" fill="none" stroke="#2e7d46" stroke-width="3" opacity="0.3"/>
  <rect x="110" y="120" width="180" height="180" rx="44" fill="#25a244"/>

  <path d="M200 155 C230 145, 270 160, 265 210 C260 250, 225 270, 200 265 C200 265, 195 240, 200 210 C205 185, 200 155, 200 155Z"
        fill="#ffffff" opacity="0.95"/>
  <line x1="200" y1="265" x2="200" y2="158" stroke="#25a244" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="238" y2="185" stroke="#25a244" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="220" x2="242" y2="208" stroke="#25a244" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="240" x2="235" y2="235" stroke="#25a244" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <circle cx="165" cy="225" r="8" fill="#ffffff" opacity="0.85"/>
  <circle cx="148" cy="210" r="5" fill="#ffffff" opacity="0.5"/>
  <line x1="155" y1="221" x2="163" y2="222" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <path d="M128 282 L145 258 L155 268 Z" fill="#25a244"/>

  <text x="350" y="242" class="wordmark">Agro<tspan fill="#25a244">link</tspan></text>
  <text x="353" y="290" class="tagline">FARM · CONNECT · TRADE</text>

  <rect x="353" y="308" width="50" height="5" rx="2" fill="#007a5e"/>
  <rect x="407" y="308" width="50" height="5" rx="2" fill="#ce1126"/>
  <rect x="461" y="308" width="50" height="5" rx="2" fill="#fcd116"/>

